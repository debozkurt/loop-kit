# loopkit CI tier — dogfood: loopkit runs on its own repo, turning a labelled issue into a draft PR.
#
# This is the install-from-checkout variant of examples/ci/github-actions.yml: loopkit is NOT on PyPI
# under this name (the PyPI `loopkit` is an unrelated library), so we install THIS repo's code with
# `pip install -e`. It also uses the `claude-code` adapter (the Claude Code CLI) instead of the
# template's `claude-api`. Auth is via OAuth (a Claude Pro/Max subscription) rather than a metered
# API key: generate the token once with `claude setup-token` and store it as the repo secret
# CLAUDE_CODE_OAUTH_TOKEN. Setup: add that secret, then label an issue `loopkit`.
name: loopkit
on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue:
        description: Issue number to run loopkit on
        required: true
permissions:
  contents: write          # push the loop's branch
  pull-requests: write     # open the draft PR
  issues: read             # read the issue (manual-dispatch path)
jobs:
  loopkit:
    # Act on issues carrying the `loopkit` label (the opt-in switch); always act on a manual run.
    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.labels.*.name, 'loopkit')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history so the loop can branch from + PR against the base
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Claude Code (the claude-code adapter's binary)
        run: npm install -g @anthropic-ai/claude-code
      - name: Install loopkit from the checkout (+ test/optional deps so the pytest gate runs green)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,all]'
      - name: Configure git identity for the loop's per-tick commits
        # The core `loopkit run` path commits via durability.commit_progress, which uses the ambient
        # git identity; GitHub runners don't set one, so an unconfigured commit would fail.
        run: |
          git config user.email "loopkit@users.noreply.github.com"
          git config user.name "loopkit"
      - name: loopkit run (issue event)
        if: github.event_name == 'issues'
        run: loopkit run --from-event "$GITHUB_EVENT_PATH" --adapter claude-code --open-pr
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}   # subscription auth (claude setup-token)
          GH_TOKEN: ${{ github.token }}                                      # scoped, ephemeral — pushes + opens the PR
      - name: loopkit run (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: loopkit run --from-issue "${{ inputs.issue }}" --adapter claude-code --open-pr
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
