# The loopkit-ops Secret — the agent + git credentials the ops pod's runs spend.
#
# This is a TEMPLATE with placeholders. Do NOT `kubectl apply` it verbatim (and never commit real
# tokens). Create the real Secret out of band, e.g. from the tokens in your shell:
#
#   kubectl -n loopkit-system create secret generic loopkit-ops \
#     --context=<your-doks-context> \
#     --from-literal=CLAUDE_CODE_OAUTH_TOKEN="$(claude setup-token)" \
#     --from-literal=GITHUB_TOKEN="$GITHUB_TOKEN"
#
# Notes:
#   * CLAUDE_CODE_OAUTH_TOKEN rides the Claude Code SUBSCRIPTION (the ops pod's runs use --adapter
#     claude-code --from-env). For the metered API instead, store ANTHROPIC_API_KEY and use
#     --adapter claude-api. Store one or the other, not both, unless you mean to.
#   * GITHUB_TOKEN needs repo scope: clone the target + push the branch + open the PR.
#   * The ops pod `envFrom`s this Secret, so `loopkit cloud run --from-env` inside the pod projects
#     these into each per-run worker Secret. This is a SHARED, long-lived key on the pod — for
#     multi-tenant attribution use the per-submitter resolver (`loopkit cloud creds set`) instead.
apiVersion: v1
kind: Secret
metadata:
  name: loopkit-ops
  namespace: loopkit-system
  labels:
    app.kubernetes.io/part-of: loopkit
    app.kubernetes.io/component: ops
type: Opaque
stringData:
  CLAUDE_CODE_OAUTH_TOKEN: "REPLACE_ME_claude_setup_token"   # or ANTHROPIC_API_KEY for the metered API
  GITHUB_TOKEN: "REPLACE_ME_github_pat_repo_scope"
  # Optional: pin the fleet Jobs this pod launches to a DOKS node pool (`cloud run` reads
  # $LOOPKIT_NODE_POOL). Kept here in the private Secret, not the manifest, so the pool name isn't
  # committed — same masking posture as the cluster/context names.
  # LOOPKIT_NODE_POOL: "your-node-pool"
