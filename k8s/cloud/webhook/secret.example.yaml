# Example Secret for the webhook listener — COPY, fill in, and apply OUT OF BAND (never commit real
# values). The listener reads all of these via `envFrom` (see deployment.yaml).
#
#   cp secret.example.yaml /tmp/loopkit-webhook.yaml   # edit /tmp copy with real values
#   kubectl apply -f /tmp/loopkit-webhook.yaml --context=<your-doks-context>
#
# Or create it imperatively (keeps secrets out of any file):
#   kubectl create secret generic loopkit-webhook --namespace loopkit-system \
#     --from-literal=LOOPKIT_WEBHOOK_SECRET="$GH_WEBHOOK_SECRET" \
#     --from-literal=LOOPKIT_WORKER_IMAGE="ghcr.io/<owner>/loopkit-worker:<tag>"
#
# This Secret holds NO agent/git keys (Phase 5a): a run resolves the submitter's key from the
# per-submitter Secrets in loopkit-system (`loopkit cloud creds set --as <eng>`). At rest, Secret
# values are base64 (NOT encrypted) in the k8s API — at-rest protection depends on the cluster's
# etcd posture, which the operator must verify (DOKS provides disk-level volume encryption, not a
# customer-configurable Secret-KMS). For git-stored secrets use sealed-secrets/SOPS; ESO/Vault is
# the v2 tier (see 04-security.md).
apiVersion: v1
kind: Secret
metadata:
  name: loopkit-webhook
  namespace: loopkit-system
  labels:
    app.kubernetes.io/part-of: loopkit
    app.kubernetes.io/component: webhook
type: Opaque
stringData:
  # REQUIRED — the listener is fail-closed and refuses to serve without this. For GitHub this is the
  # webhook's HMAC secret; for GitLab it's the project webhook's "Secret token" (set provider=gitlab
  # via LOOPKIT_WEBHOOK_PROVIDER in the Deployment).
  LOOPKIT_WEBHOOK_SECRET: "replace-with-the-webhook-secret-or-token"
  # REQUIRED — the worker image the triggered runs use.
  LOOPKIT_WORKER_IMAGE: "ghcr.io/OWNER/loopkit-worker:latest"
  # NO agent/git keys here — per-submitter Secrets in loopkit-system hold them (creds set --as).
  # GitLab ONLY — the single pinned identity whose registered key its runs spend (the token isn't
  # bound to the body, so the payload author is not trusted). Omit for GitHub (uses the issue author).
  # LOOPKIT_SUBMITTER: "gitlab-bot"
  # Optional — only an issue carrying this label dispatches a run (the opt-in switch).
  # LOOPKIT_TRIGGER_LABEL: "loopkit"
  # Optional — set to share the idempotency store across replicas (else single-replica in-memory).
  # REDIS_URL: "redis://redis.loopkit-system.svc.cluster.local:6379"
