# The demo loop. From a git-initialized copy of this directory:  loopkit doctor && loopkit run
goal = "Implement line_total in pricing.py so a 10% bulk discount applies at quantity >= 10, per PROMPT.md."
repo = "."
branch = "loopkit/run"

[agent]
adapter = "claude-code"          # swap to "codex"; "mock" runs the control flow without fixing
max_cost_usd = 5.0

[prompt]
anchors = ["PROMPT.md", "CLAUDE.md"]

[gate]
iteration = "python -m pytest tests/seen -q"      # passes even with the bug (coverage gap)
acceptance = "python -m pytest tests/holdout -q"  # catches the boundary the visible tests miss

[stops]
max_iter = 15
no_progress_after = 3

[safety]
protected_paths = ["tests/"]
require_clean_tree = true
allow_branches = ["loopkit/*"]
