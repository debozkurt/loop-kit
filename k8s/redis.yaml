# Redis — the fleet's task queue (a list) and results store (a hash), and nothing more. It is
# just a container with a thin client dep; the whole queue contract lives in extensions/fleet.py.
# Defense in depth: everything runs in a dedicated `loopkit` namespace even though the entire
# kind cluster is already ours (Ch 16 blast-radius containment, one level in).
apiVersion: v1
kind: Namespace
metadata:
  name: loopkit
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: loopkit
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--save", "", "--appendonly", "no"]  # ephemeral: a dev queue, not a database
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 1
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: loopkit
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
